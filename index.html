<html lang="en">
<head>

<style>
:root {
  --bg: #050810;
  --surface: #0f1424;
  --text: #eef0f6;
  --text-dim: #7b839a;
  --text-faint: #3d4460;
  --blue: #4d8df5;
  --blue-bright: #6ba3ff;
  --blue-deep: #1a3a7a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: "Outfit", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--blue); color: #fff; }

.ambient {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
}

.orb:nth-child(1) {
  width: 50vw;
  height: 50vw;
  background: var(--blue-deep);
  top: -20%;
  right: -15%;
  opacity: 0.25;
  animation: drift 25s ease-in-out infinite;
}

.orb:nth-child(2) {
  width: 40vw;
  height: 40vw;
  background: #12123a;
  bottom: -15%;
  left: -10%;
  opacity: 0.2;
  animation: drift 30s ease-in-out infinite reverse;
}

@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-30px, 20px); }
}

.noise {
  position: fixed;
  inset: 0;
  z-index: 1;
  opacity: 0.03;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
}

.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(77, 141, 245, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77, 141, 245, 0.02) 1px, transparent 1px);
  background-size: 80px 80px;
}

.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 600px;
}

.disc-wrap {
  width: 160px;
  height: 160px;
  margin: 0 auto 3rem;
  opacity: 0;
  animation: fadeUp 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.name {
  font-family: "Fraunces", serif;
  font-size: clamp(2.5rem, 7vw, 3.5rem);
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeUp 1s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.name .highlight {
  background: linear-gradient(135deg, var(--blue), var(--blue-bright));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 1s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.status-dot {
  width: 6px;
  height: 6px;
  background: var(--blue);
  border-radius: 50%;
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(77, 141, 245, 0.4); }
  50% { opacity: 0.5; box-shadow: 0 0 0 8px rgba(77, 141, 245, 0); }
}

.message {
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.links {
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 1s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.link-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border: 1px solid rgba(77, 141, 245, 0.1);
  border-radius: 60px;
  font-family: "Outfit", sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text);
  text-decoration: none;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.link-pill:hover {
  background: rgba(77, 141, 245, 0.08);
  border-color: rgba(77, 141, 245, 0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(77, 141, 245, 0.12);
  color: var(--blue-bright);
}

.link-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
}

.coords {
  margin-top: 3rem;
  font-size: 0.65rem;
  color: var(--text-faint);
  letter-spacing: 0.1em;
  opacity: 0;
  animation: fadeUp 1s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  body {
    overflow: auto;
    padding: 2rem 0;
  }

  .container {
    padding: 1.5rem;
  }

  .disc-wrap {
    width: 132px;
    height: 132px;
    margin-bottom: 2rem;
  }

  .message {
    font-size: 1rem;
    margin-bottom: 2rem;
  }

  .coords {
    margin-top: 2rem;
    font-size: 0.7rem;
  }
}
</style>
</head>
<body>
